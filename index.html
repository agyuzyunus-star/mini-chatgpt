<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Mini ChatGPT Premium</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:#f3df9b;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
inset:0;
background:black url('https://i.imgur.com/8yKQFQG.png') center/cover;
opacity:0.3;
}

/* LAYOUT */
.app{
display:flex;
height:100vh;
position:relative;
z-index:2;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(15px);
padding:15px;
border-right:1px solid rgba(255,215,0,0.2);
}

.logo{
color:gold;
font-size:22px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,gold,#ffcc00);
cursor:pointer;
}

/* CHAT */
.chat{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
padding:20px;
overflow:auto;
}

.msg{
padding:10px;
margin:10px 0;
border-radius:10px;
}

.user{background:#222;}
.bot{background:rgba(255,215,0,0.1);}

.input{
display:flex;
padding:15px;
background:rgba(0,0,0,0.5);
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
background:#111;
color:white;
}

.send{
width:120px;
margin-left:10px;
}

/* LOGIN */
.center{
display:flex;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}
</style>
</head>

<body>

<div class="bg"></div>
<div id="app"></div>

<script>
const API="https://mini-chatgpt-backend-7t79.onrender.com"
let token=localStorage.getItem("token")

function showLogin(){
document.getElementById("app").innerHTML=`
<div class="center">
<h2 style="color:gold">✨ Mini ChatGPT</h2>
<input id="u" placeholder="Kullanıcı adı">
<input id="p" type="password" placeholder="Şifre">
<button onclick="login()">Giriş</button>
<button onclick="showRegister()">Kayıt Ol</button>
</div>`
}

function showRegister(){
document.getElementById("app").innerHTML=`
<div class="center">
<h2>Kayıt</h2>
<input id="u">
<input id="p1" type="password" placeholder="Şifre">
<input id="p2" type="password" placeholder="Şifre tekrar">
<button onclick="register()">Kayıt Ol</button>
</div>`
}

async function register(){
let u=document.getElementById("u").value
let p1=document.getElementById("p1").value
let p2=document.getElementById("p2").value

if(p1!==p2) return alert("Şifreler aynı değil")

await fetch(API+"/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u,password:p1})
})

alert("Kayıt başarılı")
showLogin()
}

async function login(){
let u=document.getElementById("u").value
let p=document.getElementById("p").value

let res=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u,password:p})
})

let data=await res.json()

if(!data.token){
alert("Giriş başarısız")
return
}

token=data.token
localStorage.setItem("token",token)

loadChat()
}

function loadChat(){
document.getElementById("app").innerHTML=`
<div class="app">

<div class="sidebar">
<div class="logo">✨ Mini ChatGPT</div>

<button onclick="loadChat()">+ Yeni Chat</button>
<button onclick="logout()">Çıkış Yap</button>

</div>

<div class="chat">
<div id="messages" class="messages"></div>

<div class="input">
<input id="msg" placeholder="Mesaj yaz...">
<button class="send" onclick="send()">Gönder</button>
</div>

</div>
</div>
`

loadHistory()
}

async function loadHistory(){
let res=await fetch(API+"/history/"+token)
let data=await res.json()

let box=document.getElementById("messages")
box.innerHTML=""

data.forEach(c=>{
box.innerHTML+=`
<div class="msg user">🧑 ${c.message}</div>
<div class="msg bot">${c.reply}</div>
`
})
}

async function send(){
let msg=document.getElementById("msg").value

let res=await fetch(API+"/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({token:token,message:msg})
})

let data=await res.json()

let box=document.getElementById("messages")

box.innerHTML+=`
<div class="msg user">🧑 ${msg}</div>
<div class="msg bot">${data.reply}</div>
`

document.getElementById("msg").value=""
}

function logout(){
localStorage.removeItem("token")
showLogin()
}

if(token) loadChat()
else showLogin()
</script>

</body>
</html>
