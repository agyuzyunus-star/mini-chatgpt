<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Mini ChatGPT</title>

<style>
body {
  background: black;
  color: gold;
  font-family: Arial;
  margin: 0;
}

#chat {
  height: 80vh;
  overflow-y: auto;
  padding: 20px;
}

.msg {
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
}

.user {
  background: gold;
  color: black;
  text-align: right;
}

.ai {
  background: #222;
}

#input {
  display: flex;
  padding: 10px;
}

textarea {
  flex: 1;
  padding: 10px;
}

button {
  padding: 10px;
  background: gold;
  border: none;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="input">
  <textarea id="msg"></textarea>
  <button onclick="send()">Gönder</button>
</div>

<script>
const API = "https://mini-chatgpt-backend-7t79.onrender.com";

function add(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}

async function send() {
  let msg = document.getElementById("msg").value.trim();

  if (!msg) msg = "Merhaba";

  add(msg, "user");

  document.getElementById("msg").value = "";

  try {
    const res = await fetch(API + "/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: msg
      })
    });

    const data = await res.json();

    add(data.reply, "ai");

  } catch (e) {
    add("Bağlantı hatası", "ai");
  }
}
</script>

</body>
</html>
