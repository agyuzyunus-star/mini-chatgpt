<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini ChatGPT</title>
<style>
body {
  margin:0;
  font-family:Arial;
  background:url("https://raw.githubusercontent.com/agyuzyunus-star/mini-chatgpt/main/background.jpg") no-repeat center/cover;
  color:white;
}
#chat {height:80vh; overflow:auto; padding:20px;}
input {width:80%; padding:10px;}
button {padding:10px;}
</style>
</head>
<body>

<div id="login">
  <input id="user" placeholder="kullanıcı"><br>
  <input id="pass" placeholder="şifre"><br>
  <button onclick="login()">Giriş</button>
</div>

<div id="app" style="display:none">
  <div id="chat"></div>

  <div id="drop" style="border:1px dashed white;padding:10px;margin:10px">
    sürükle bırak
  </div>

  <input id="msg">
  <button onclick="send()">Gönder</button>
</div>

<script>
const API="https://mini-chatgpt-backend-7t79.onrender.com"

let user=null, chat_id=null, img=null

function login(){
 fetch(API+"/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    username:user.value,
    password:pass.value
  })
 }).then(r=>r.json()).then(d=>{
  if(d.success){
    user=d.username
    loginDiv.style.display="none"
    app.style.display="block"
  }
 })
}

drop.ondrop=e=>{
 e.preventDefault()
 let f=e.dataTransfer.files[0]
 let r=new FileReader()
 r.onload=()=>img=r.result
 r.readAsDataURL(f)
}
drop.ondragover=e=>e.preventDefault()

function send(){
 fetch(API+"/chat",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
    username:user,
    chat_id:chat_id,
    message:msg.value,
    image_base64:img
  })
 }).then(r=>r.json()).then(d=>{
  chat.innerHTML+= "<div>"+msg.value+"</div>"
  chat.innerHTML+= "<div>"+d.reply+"</div>"
  chat_id=d.chat_id
 })
}
</script>

</body>
</html>
