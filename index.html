<script>
const API_BASE = "https://mini-chatgpt-backend-7t79.onrender.com";

let isLoginMode = true;
let currentUser = localStorage.getItem("mini_chatgpt_user") || null;
let currentChatId = "default";
let selectedImageBase64 = null;

/* ================= API ================= */
async function api(path, method="GET", body=null){
  const options = {
    method,
    headers: {
      "Content-Type": "application/json",
      "Authorization": localStorage.getItem("token") || ""
    }
  };

  if(body) options.body = JSON.stringify(body);

  const res = await fetch(API_BASE + path, options);
  const data = await res.json();

  if(!res.ok){
    throw new Error(data.detail || data.message || JSON.stringify(data));
  }

  return data;
}

/* ================= AUTH ================= */
function toggleMode(){
  isLoginMode = !isLoginMode;
  document.getElementById("authModeText").textContent = isLoginMode ? "Giriş yap" : "Kayıt ol";
  document.getElementById("authButton").textContent = isLoginMode ? "Giriş Yap" : "Kayıt Ol";
  document.getElementById("passwordConfirm").classList.toggle("hidden", isLoginMode);
}

async function handleAuth(){
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const passwordConfirm = document.getElementById("passwordConfirm").value.trim();
  const msg = document.getElementById("authMessage");

  if(!username || !password){
    msg.textContent = "Kullanıcı adı ve şifre gir.";
    return;
  }

  if(!isLoginMode && password !== passwordConfirm){
    msg.textContent = "Şifreler eşleşmiyor.";
    return;
  }

  try{
    const endpoint = isLoginMode ? "/login" : "/register";
    const data = await api(endpoint,"POST",{username,password});

    msg.textContent = data.message || data.detail || "İşlem başarılı";

    // LOGIN FIX
    if(isLoginMode && (data.token || data.success)){
      currentUser = username;
      localStorage.setItem("mini_chatgpt_user", username);
      localStorage.setItem("token", data.token || "ok");
      startApp();
    }

    if(!isLoginMode){
      msg.textContent = "Kayıt başarılı, giriş yap.";
      isLoginMode = true;
      toggleMode();
    }

  }catch(e){
    msg.textContent = e.message || "Hata oluştu";
  }
}

/* ================= APP ================= */
function startApp(){
  document.getElementById("authScreen").classList.add("hidden");
  document.getElementById("appScreen").classList.remove("hidden");
  document.getElementById("userBadge").textContent = "Kullanıcı: " + currentUser;

  renderMessages();
}

/* ================= CHAT ================= */
async function renderMessages(){
  const chatBox = document.getElementById("chatBox");
  chatBox.innerHTML = "";

  try{
    const data = await api("/history/" + localStorage.getItem("token"));

    data.forEach(c=>{
      chatBox.innerHTML += `
        <div class="message-wrap user-wrap">
          <div class="message user">${c.message}</div>
        </div>
        <div class="message-wrap ai-wrap">
          <div class="message ai">${c.reply}</div>
        </div>
      `;
    });

    chatBox.scrollTop = chatBox.scrollHeight;

  }catch(e){
    console.log(e);
  }
}

async function send(){
  const input = document.getElementById("msg");
  const message = input.value.trim();
  if(!message) return;

  const chatBox = document.getElementById("chatBox");

  chatBox.innerHTML += `
    <div class="message-wrap user-wrap">
      <div class="message user">${message}</div>
    </div>
  `;

  input.value = "";

  try{
    const res = await api("/chat","POST",{
      token: localStorage.getItem("token"),
      message: message
    });

    chatBox.innerHTML += `
      <div class="message-wrap ai-wrap">
        <div class="message ai">${res.reply || JSON.stringify(res)}</div>
      </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;

  }catch(e){
    alert(e.message);
  }
}

/* ================= LOGOUT ================= */
function logout(){
  localStorage.removeItem("mini_chatgpt_user");
  localStorage.removeItem("token");
  location.reload();
}

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", ()=>{
  if(currentUser){
    startApp();
  }
});

document.getElementById("msg").addEventListener("keydown", function(e){
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});
</script>
