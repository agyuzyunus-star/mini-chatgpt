<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Mini ChatGPT</title>

<style>
* {
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin:0;
    height:100vh;
    background: radial-gradient(circle at top, #1a1a2e, #000);
    color:white;
}

/* LAYOUT */
.container {
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar {
    width:270px;
    background: linear-gradient(180deg,#0d0d0d,#1a1a1a);
    padding:15px;
    border-right:1px solid rgba(255,215,0,0.2);
}

.logo {
    font-size:20px;
    color:gold;
    margin-bottom:20px;
}

button {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:linear-gradient(45deg,gold,#ffcc00);
    cursor:pointer;
}

.danger {
    background:linear-gradient(45deg,#ff5f5f,#ff2e2e);
}

/* CHAT AREA */
.chat {
    flex:1;
    display:flex;
    flex-direction:column;
    backdrop-filter: blur(20px);
}

/* HEADER */
.topbar {
    padding:15px;
    border-bottom:1px solid rgba(255,255,255,0.1);
    display:flex;
    justify-content:space-between;
}

/* MESSAGES */
.messages {
    flex:1;
    padding:20px;
    overflow:auto;
}

.msg {
    margin-bottom:15px;
    padding:10px;
    border-radius:10px;
}

.user {
    background:#222;
}

.bot {
    background:rgba(255,215,0,0.1);
}

/* INPUT */
.input {
    display:flex;
    padding:15px;
    border-top:1px solid rgba(255,255,255,0.1);
}

.input input {
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#111;
    color:white;
}

.send {
    width:120px;
    margin-left:10px;
}

/* LOGIN */
.center {
    display:flex;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

input {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const API = "https://mini-chatgpt-backend-7t79.onrender.com"
let token = localStorage.getItem("token")

function showLogin(){
document.getElementById("app").innerHTML=`
<div class="center">
<h2 style="color:gold">Mini ChatGPT</h2>
<input id="u" placeholder="Kullanıcı adı">
<input id="p" type="password" placeholder="Şifre">
<button onclick="login()">Giriş</button>
<button onclick="showRegister()">Kayıt Ol</button>
</div>`
}

function showRegister(){
document.getElementById("app").innerHTML=`
<div class="center">
<h2>Kayıt Ol</h2>
<input id="u" placeholder="Kullanıcı adı">
<input id="p1" type="password" placeholder="Şifre">
<input id="p2" type="password" placeholder="Şifre tekrar">
<button onclick="register()">Kayıt</button>
</div>`
}

async function register(){
let u=document.getElementById("u").value
let p1=document.getElementById("p1").value
let p2=document.getElementById("p2").value

if(p1!==p2) return alert("Şifreler aynı değil")

await fetch(API+"/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u,password:p1})
})

alert("Kayıt başarılı")
showLogin()
}

async function login(){
let u=document.getElementById("u").value
let p=document.getElementById("p").value

let res=await fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u,password:p})
})

let data=await res.json()
token=data.token
localStorage.setItem("token",token)

loadChat()
}

function loadChat(){
document.getElementById("app").innerHTML=`
<div class="container">

<div class="sidebar">
<div class="logo">✨ Mini ChatGPT</div>

<button onclick="newChat()">+ Yeni Chat</button>
<button onclick="logout()">Çıkış Yap</button>
<button class="danger" onclick="clearChats()">Tüm Chatleri Sil</button>

<input placeholder="Chat ara...">
</div>

<div class="chat">

<div class="topbar">
<div>Yeni Sohbet</div>
<div>Gold Mode</div>
</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msg" placeholder="Mesajınızı yazın...">
<button class="send" onclick="send()">Gönder</button>
</div>

</div>
</div>
`

loadHistory()
}

async function loadHistory(){
let res=await fetch(API+"/history/"+token)
let data=await res.json()

let box=document.getElementById("messages")
box.innerHTML=""

data.forEach(c=>{
box.innerHTML+=`
<div class="msg user">🧑 ${c.message}</div>
<div class="msg bot">${c.reply}</div>
`
})
}

async function send(){
let msg=document.getElementById("msg").value

let res=await fetch(API+"/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({token:token,message:msg})
})

let data=await res.json()

let box=document.getElementById("messages")
box.innerHTML+=`
<div class="msg user">🧑 ${msg}</div>
<div class="msg bot">${data.reply}</div>
`

document.getElementById("msg").value=""
}

function logout(){
localStorage.removeItem("token")
showLogin()
}

function clearChats(){
location.reload()
}

if(token) loadChat()
else showLogin()
</script>

</body>
</html>
