<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Mini ChatGPT</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

.container {
    display:flex;
    height:100vh;
}

.sidebar {
    width:260px;
    background:#111;
    padding:10px;
}

.chat {
    flex:1;
    display:flex;
    flex-direction:column;
}

.messages {
    flex:1;
    padding:20px;
    overflow:auto;
}

.input {
    display:flex;
    padding:10px;
    background:#222;
}

input {
    flex:1;
    padding:10px;
}

button {
    padding:10px;
    background:gold;
    border:none;
}
</style>

</head>

<body>

<div id="app"></div>

<script>
const API = "https://mini-chatgpt-backend-7t79.onrender.com"

let token = localStorage.getItem("token")

function showLogin() {
document.getElementById("app").innerHTML = `
<h2>Login</h2>
<input id="u" placeholder="username"><br>
<input id="p" type="password" placeholder="password"><br>
<button onclick="login()">Login</button>
<button onclick="showRegister()">Register</button>
`
}

function showRegister() {
document.getElementById("app").innerHTML = `
<h2>Register</h2>
<input id="u">
<input id="p1" type="password">
<input id="p2" type="password">
<button onclick="register()">Kayıt</button>
`
}

async function register() {
let u = u.value
let p1 = p1.value
let p2 = p2.value

if(p1 !== p2) return alert("Şifreler aynı değil")

await fetch(API+"/register", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u,password:p1})
})

alert("Kayıt OK")
showLogin()
}

async function login() {
let u = document.getElementById("u").value
let p = document.getElementById("p").value

let res = await fetch(API+"/login", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u,password:p})
})

let data = await res.json()
token = data.token
localStorage.setItem("token", token)

loadChat()
}

function loadChat() {
document.getElementById("app").innerHTML = `
<div class="container">
<div class="sidebar">
<button onclick="newChat()">+ Yeni Chat</button>
<div id="history"></div>
</div>

<div class="chat">
<div id="messages" class="messages"></div>

<div class="input">
<input id="msg">
<button onclick="send()">Gönder</button>
</div>
</div>
</div>
`

loadHistory()
}

async function loadHistory() {
let res = await fetch(API+"/history/"+token)
let data = await res.json()

let html = ""
data.forEach(c => {
html += `<div>${c.message}</div>`
})

document.getElementById("history").innerHTML = html
}

async function send() {
let msg = document.getElementById("msg").value

let res = await fetch(API+"/chat", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({token:token,message:msg})
})

let data = await res.json()

document.getElementById("messages").innerHTML += `
<div>🧑 ${msg}</div>
<div>${data.reply}</div>
`
}

if(token) loadChat()
else showLogin()

</script>

</body>
</html>
